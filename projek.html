<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="base-url" content="">
  <title>Projek — FIRA</title>
  <meta name="description" content="Galeri projek baja ringan Fira — Residensial, Komersial, Industrial, dan Institutional di seluruh Jawa Timur.">
  <link rel="icon" href="assets/logos/f-wing_1.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/lenis@1.3.23/dist/lenis.css">
</head>
<body>
<script>!function(){try{var f=sessionStorage.getItem('fira-pt');if(!f)return;sessionStorage.removeItem('fira-pt');var o=document.createElement('div');o.id='fira-pt-ol';o.style.cssText='position:fixed;inset:0;z-index:9999;background:#0e0e0e;display:flex;align-items:center;justify-content:center;';var m=document.querySelector('meta[name="base-url"]');o.innerHTML='<img src="'+(m?m.content:'')+'assets/logos/logotype-square.svg" style="width:60px;animation:loaderBounce 1s ease-in-out infinite" alt="">';document.body.appendChild(o);}catch(e){}}();</script>

  <!-- ── TOP NAV (injected by components.js) ── -->
  <div id="nav-placeholder" data-page="projek"></div>
  <script>!function(){try{var c=sessionStorage.getItem('fira-nav'),s=document.getElementById('nav-placeholder');if(!c||!s)return;var p=s.dataset.page||'',h=c;if(p){h=h.replace('href="'+p+'.html" class="navbar__link"','href="'+p+'.html" class="navbar__link active"');h=h.replace('class="navbar"','class="navbar navbar--transparent"');}else{h=h.replace('class="navbar"','class="navbar is-hidden"').replace('<div class="nav-spacer" aria-hidden="true"></div>','');}s.outerHTML=h;}catch(e){}}();</script>

  <main class="produk-page">

    <!-- ── HERO ── -->
    <section class="page-hero page-hero--projek" aria-label="Projek">
      <div class="page-hero__inner">
        <h1 class="page-hero__title" data-i18n="projek.hero">Projek</h1>
      </div>
    </section>

    <!-- ── PROJECT CATALOGUE ── -->
    <div class="catalogue" aria-live="polite">
      <div id="projek-root">
      </div>
    </div>

  </main>

  <div id="footer-placeholder" data-footer="v2"></div>

  <script src="https://unpkg.com/lenis@1.3.23/dist/lenis.min.js"></script>
  <script>window.lenis = new Lenis({ autoRaf: true })</script>
  <script src="js/scroll.js" defer></script>
  <script src="js/loader.js" defer></script>
  <script src="js/components.js" defer></script>
  <script src="js/cms.js" defer></script>
  <script src="js/main.js" defer></script>
  <script src="js/i18n.js" defer></script>
</body>
</html>
