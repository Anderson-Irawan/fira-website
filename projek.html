<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="base-url" content="">
  <title>Projek — FIRA</title>
  <meta name="description" content="Galeri projek baja ringan Fira — Residensial, Komersial, Industrial, dan Institutional di seluruh Jawa Timur.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ── TOP NAV (injected by components.js) ── -->
  <div id="nav-placeholder" data-page="projek"></div>
  <script>!function(){try{var c=sessionStorage.getItem('fira-nav'),s=document.getElementById('nav-placeholder');if(!c||!s)return;var p=s.dataset.page||'',h=c;if(p)h=h.replace('href="'+p+'.html" class="navbar__link"','href="'+p+'.html" class="navbar__link active"');else{h=h.replace('class="navbar"','class="navbar is-hidden"').replace('<div class="nav-spacer" aria-hidden="true"></div>','');}s.outerHTML=h;}catch(e){}}();</script>

  <main class="produk-page">

    <!-- ── HEADER ── -->
    <header class="produk-header" data-animate>
      <h1 class="produk-header__title">Projek Kita</h1>
    </header>

    <!-- ── PROJECT CATALOGUE ── -->
    <div class="catalogue" aria-live="polite">
      <div id="projek-root">
      </div>
    </div>

  </main>

  <div id="footer-placeholder" data-footer="v2"></div>

  <script src="js/loader.js"></script>
  <script src="js/components.js"></script>
  <script src="js/cms.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
