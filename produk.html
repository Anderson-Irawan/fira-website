<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="base-url" content="">
  <title>Produk — FIRA</title>
  <meta name="description" content="Katalog produk baja ringan Fira — Atap, Truss, Reng, Holo, Wallpanel, PVC dan lebih.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ── TOP NAV (injected by components.js) ── -->
  <div id="nav-placeholder" data-page="produk"></div>

  <main class="produk-page">

    <!-- ── HEADER ── -->
    <header class="produk-header" data-animate>
      <h1 class="produk-header__title">Produk Kita</h1>
    </header>

    <!-- ── SEARCH ── -->
    <div class="search-wrap" role="search" data-animate style="transition-delay:0.15s">
      <div class="search-bar">
        <div class="search-bar__icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>
        <input
          id="search-input"
          class="search-bar__input"
          type="search"
          placeholder="Cari dari Katalog Produk Kami ..."
          aria-label="Cari produk"
          autocomplete="off"
        >
      </div>
    </div>

    <!-- ── CATALOGUE ── -->
    <div class="catalogue" aria-live="polite">
      <div id="catalogue-root">
        <!-- Populated dynamically by cms.js from data/products.json -->
        <p style="color: var(--clr-gray-mid); font-size:14px; padding: 24px 0;">
          Memuat katalog produk...
        </p>
      </div>
      <p id="search-empty" class="search-empty" role="status">
        Produk tidak ditemukan. Coba kata kunci lain.
      </p>
    </div>

  </main>

  <div id="footer-placeholder" data-footer="v2"></div>

  <script src="js/loader.js"></script>
  <script src="js/components.js"></script>
  <script src="js/cms.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
